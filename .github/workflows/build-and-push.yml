name: Build and Push Container

on:
  push:
    branches:
      - prime

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rrvsh/aenyrathia
  AR_HOST: asia-southeast1-docker.pkg.dev
  AR_REPO: aenyrathia/aenyrathia/app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image-ref.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: aenyrathia
          workload_identity_provider: projects/620732881410/locations/global/workloadIdentityPools/github/providers/github
          service_account: github-actions-ci@aenyrathia.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: aenyrathia

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prime
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.AR_HOST }}/${{ env.AR_REPO }}:prime
            ${{ env.AR_HOST }}/${{ env.AR_REPO }}:latest
            ${{ env.AR_HOST }}/${{ env.AR_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image reference
        id: image-ref
        run: echo "image=${{ env.AR_HOST }}/${{ env.AR_REPO }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: aenyrathia
          workload_identity_provider: projects/620732881410/locations/global/workloadIdentityPools/github/providers/github
          service_account: github-actions-ci@aenyrathia.iam.gserviceaccount.com

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: aenyrathia
          region: asia-southeast1
          image: ${{ needs.build-and-push.outputs.image }}
