[package]
name = "pinbreak"
version = "0.1.0-alpha"
description = "CLI tool to roll dice (for now)"
edition = "2024"
readme = "docs/README.md"
repository = "https://github.com/rrvsh/pinbreak"
license = "MIT"
keywords = ["cli"]
categories = ["command-line-utilities"]

[dependencies]
clap = { version = "4.5.53", features = ["derive"] }
rand = "0.9.2"

[lints.clippy]
correctness = "deny"
suspicious = "deny"
complexity = "deny"
perf = "deny"
style = "deny"
pedantic = "deny"
cargo = "deny"
nursery = "deny"
