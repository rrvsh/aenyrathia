<!DOCTYPE html>
<html>
  <body>
    <header>
      {% match username %}
        {% when Some with (val) %}
        signed in as: <a href="/logout">{{ val }}</a>
        {% when None %}
        <form method="post" action="/login">
          <input name="username">
          <button>Login</button>
        </form>
      {% endmatch %}
    </header>
    <div>
      {% if edit_mode %}
        <form method="post">
          <textarea name="markdown" rows="12" cols="80">{{ raw_file_content }}</textarea>
          <button>Send</button>
        </form>
      {% else %}
        {{ rendered_html|safe }}
      {% endif %}
    </div>
  </body>
</html>
