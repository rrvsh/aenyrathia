<!DOCTYPE html>
<html>
  <body>
    <header>
      {% match full_name %}
        {% when Some with (val) %}
        signed in as: {{ val }}
        {% when None %}
        <a href="/login">Login</a>
      {% endmatch %}
    </header>
    <div>
      {% if edit_mode %}
        <form method="post">
          <textarea name="markdown" rows="12" cols="80">{{ raw_file_content }}</textarea>
          <button>Send</button>
        </form>
      {% else %}
        {{ rendered_html|safe }}
      {% endif %}
    </div>
  </body>
</html>
