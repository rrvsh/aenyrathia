{% extends "base.html" %}

{% block content %}
  <form method="post" action="/login?redirect_to={{ redirect_path }}">
    <h1>Login</h1>
    <label>
      Email
      <input required name="email" type="email" placeholder="rafiq@rrv.sh" autocomplete="email">
    </label>
    <label>
      Password
      <input required name="password" type="password" autocomplete="current-password">
    </label>
    <button type="submit">Login</button>
  </form>
{% endblock %}
